<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>NickWeb</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #000;
  color: #fff;
}

/* TOPO */
.topbar {
  background: #0e0e0e;
  padding: 14px;
  font-size: 22px;
  font-weight: bold;
}

/* PLAYER */
.player-wrapper {
  display: flex;
  justify-content: center;
  margin-top: 10px;
}

.player {
  width: 90%;
  max-width: 900px;
  aspect-ratio: 16 / 9;
  background: black;
}

.player iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* INFO */
.info {
  max-width: 900px;
  margin: 15px auto;
  padding: 0 15px;
}

.info h1 {
  margin: 0;
  font-size: 26px;
}

.info p {
  margin-top: 6px;
  font-size: 14px;
  opacity: 0.85;
}

/* BOTÃO FLUTUANTE */
.chat-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #6a0dad;
  color: #fff;
  border: none;
  padding: 14px 18px;
  font-size: 16px;
  border-radius: 50px;
  cursor: pointer;
  z-index: 1000;
}

.chat-btn:hover {
  background: #7d1fd1;
}

/* OVERLAY CHAT */
.chat-overlay {
  position: fixed;
  bottom: 80px;
  right: 20px;
  width: 320px;
  height: 420px;
  background: #000;
  border: 2px solid #6a0dad;
  border-radius: 10px;
  display: none;
  z-index: 1000;
  overflow: hidden;
}

.chat-overlay iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<div class="topbar">NickWeb</div>

<div class="player-wrapper">
  <div class="player">
    <iframe
      src="https://player.twitch.tv/?channel=nickelodeonbrasil309873&parent=live-nickweb.github.io&autoplay=true&muted=false"
      allowfullscreen
      allow="autoplay; fullscreen">
    </iframe>
  </div>
</div>

<div class="info">
  <h1>NickWeb</h1>
  <p>Todos os direitos reservados à Paramount Skydance</p>
</div>

<!-- CHAT FLUTUANTE -->
<div id="chat" class="chat-overlay">
  <iframe src="https://nick-web.chatango.com/"></iframe>
</div>

<button class="chat-btn" onclick="toggleChat()">Chat</button>

<script>
function toggleChat() {
  const chat = document.getElementById("chat");
  chat.style.display = (chat.style.display === "none" || chat.style.display === "")
    ? "block"
    : "none";
}
</script>

</body>
</html>
