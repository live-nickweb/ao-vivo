<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Nickelodeon Web</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

.topbar {
  padding: 14px 16px;
  font-size: 22px;
  font-weight: 600;
}

.player-wrapper {
  display: flex;
  justify-content: center;
  margin: 14px 0 6px;
}

.player {
  width: 95%;
  max-width: 900px;
  aspect-ratio: 16 / 9;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 0 20px rgba(128,0,255,0.3);
  position: relative;
}

video {
  width: 100%;
  height: 100%;
  background: #000;
}

/* CONTADOR */
.viewers-overlay {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(6px);
  padding: 6px 10px;
  border-radius: 20px;
  font-size: 14px;
  display: none;
  align-items: center;
  gap: 6px;
}

.viewers-overlay svg {
  width: 16px;
  height: 16px;
  fill: white;
}

.logo-circle {
  display: flex;
  justify-content: center;
  margin: 18px 0 10px;
}

.logo-circle img {
  width: 110px;
  aspect-ratio: 1 / 1;
  border-radius: 50%;
  border: 3px solid #fff;
  padding: 10px;
  object-fit: contain;
}

.content {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 16px 40px;
}

.content h1 {
  font-size: 28px;
  font-weight: 700;
  margin: 18px 0 10px;
}

.content p {
  font-size: 18px;
  line-height: 1.5;
  margin: 0 0 22px;
  opacity: 0.95;
}

.chat-btn {
  position: fixed;
  right: 18px;
  bottom: 18px;
  background: #5f98e3;
  color: #fff;
  border: none;
  padding: 12px 18px;
  font-size: 15px;
  border-radius: 50px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  box-shadow: 0 4px 12px rgba(128,0,255,0.3);
}

.chat-btn::before {
  content: "💬";
}

.chat-overlay {
  position: fixed;
  right: 18px;
  bottom: 70px;
  width: 320px;
  height: 420px;
  background: #000;
  border: 1px solid #333;
  border-radius: 10px;
  display: none;
}

.chat-overlay iframe {
  width: 100%;
  height: 100%;
  border: none;
}

@media (max-width: 480px) {
  .chat-overlay {
    width: 90%;
    height: 300px;
    right: 5%;
    bottom: 60px;
  }

  .player {
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="topbar">Nickelodeon Web - AO VIVO!</div>

<!-- PLAYER HLS -->
<div class="player-wrapper">
  <div class="player">
    <video id="video" controls autoplay muted playsinline></video>

    <!-- CONTADOR -->
    <div class="viewers-overlay">
      <svg viewBox="0 0 24 24">
        <path d="M12 5c-7 0-11 7-11 7s4 7 11 7 11-7 11-7-4-7-11-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
      </svg>
      <span id="viewers">0</span>
    </div>

  </div>
</div>

<div class="logo-circle">
  <img src="https://i.ibb.co/TxV7nwLw/20260420-172534.png">
</div>

<div class="content">
  <h1>Nickelodeon Web</h1>
  <p>Todos os direitos reservados à Paramount Skydance</p>
  <p>Nós somos a Nickelodeon Web, um revival da Nickelodeon Brasil, assista seus desenhos favoritos aqui!</p>
</div>

<div id="chat" class="chat-overlay">
  <iframe src="https://nick-web.chatango.com/"></iframe>
</div>

<button class="chat-btn" onclick="toggleChat()">Chat</button>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
function toggleChat() {
  const chat = document.getElementById("chat");
  chat.style.display =
    chat.style.display === "block" ? "none" : "block";
}

const video = document.getElementById('video');
const videoSrc = 'https://vs20.live.opencaster.com/nickelodeonbrasil_68f1743d/index.m3u8';

if (Hls.isSupported()) {
  const hls = new Hls();
  hls.loadSource(videoSrc);
  hls.attachMedia(video);
} else if (video.canPlayType('application/vnd.apple.mpegurl')) {
  video.src = videoSrc;
}

/* CONTADOR */
let ultimoValorValido = 0;

function pegarViewers(callback) {
  fetch("https://vs20.live.opencaster.com/show_current.php?streamname=nickelodeonbrasil_68f1743d")
    .then(res => res.text())
    .then(texto => {
      let match = texto.match(/conexiones":(\d+)/);

      if (match && match[1]) {
        let valor = parseInt(match[1]);
        if (!isNaN(valor)) {
          ultimoValorValido = valor;
        }
      }
      callback();
    })
    .catch(() => callback());
}

function atualizarUI() {
  const overlay = document.querySelector(".viewers-overlay");

  if (ultimoValorValido === 0) {
    overlay.style.display = "none";
  } else {
    overlay.style.display = "flex";
  }

  document.getElementById("viewers").innerText = ultimoValorValido;
}

// carregar rápido
pegarViewers(atualizarUI);

// fallback rápido
setTimeout(() => {
  if (ultimoValorValido === 0) {
    pegarViewers(atualizarUI);
  }
}, 2000);

// atualizar a cada 30s
setInterval(() => {
  pegarViewers(atualizarUI);
}, 30000);

// AUTO SOM
function tryUnmute() {
  video.muted = false;
}

video.addEventListener('playing', () => {
  setTimeout(() => {
    video.muted = false;
  }, 500);
});

document.addEventListener('click', tryUnmute);
document.addEventListener('touchstart', tryUnmute);

</script>

</body>
</html>
