<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>NickWeb</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #000;
  color: #fff;
}

/* TOPO */
.topbar {
  background: #000;
  padding: 14px;
  font-size: 22px;
  font-weight: bold;
  border-bottom: 2px solid #fff;
}

/* PLAYER */
.player-wrapper {
  display: flex;
  justify-content: center;
  margin: 15px 0;
}

.player {
  width: 90%;
  max-width: 900px;
  aspect-ratio: 16 / 9;
}

.player iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* TEXTO ACIMA DA LOGO */
.nickweb-right {
  max-width: 900px;
  margin: 10px auto 0;
  padding: 0 15px;
  text-align: right;
  font-size: 20px;
  font-weight: bold;
}

/* LOGO COM CÍRCULO */
.logo-circle {
  display: flex;
  justify-content: center;
  margin: 10px 0 18px;
}

.logo-circle img {
  width: 100px;   /* logo menor */
  height: 100px;
  object-fit: contain;
  border-radius: 50%;
  border: 3px solid #fff;
  padding: 10px;
  background: #000;
}

/* TEXTO */
.info {
  max-width: 900px;
  margin: 10px auto 40px;
  padding: 0 15px;
  text-align: left;
}

.info .direitos {
  margin: 0 0 10px;
  font-size: 20px;
}

.info .descricao {
  margin: 0;
  font-size: 20px;
}

/* BOTÃO CHAT */
.chat-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #6a0dad;
  color: #fff;
  border: none;
  padding: 14px 18px;
  font-size: 16px;
  border-radius: 50px;
  cursor: pointer;
  z-index: 1000;
}

.chat-btn:hover {
  background: #7d1fd1;
}

/* CHAT */
.chat-overlay {
  position: fixed;
  bottom: 80px;
  right: 20px;
  width: 320px;
  height: 420px;
  background: #000;
  border: 2px solid #fff;
  border-radius: 10px;
  display: none;
  z-index: 1000;
}

.chat-overlay iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<div class="topbar">NickWeb</div>

<div class="player-wrapper">
  <div class="player">
    <iframe
      src="https://player.twitch.tv/?channel=nickelodeonbrasil309873&parent=live-nickweb.github.io&autoplay=true&muted=false"
      allowfullscreen
      allow="autoplay; fullscreen">
    </iframe>
  </div>
</div>

<!-- TEXTO NO CANTO DIREITO -->
<div class="nickweb-right">NickWeb</div>

<!-- LOGO -->
<div class="logo-circle">
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Nickelodeon_2023_logo_%28outline%29.svg/250px-Nickelodeon_2023_logo_%28outline%29.svg.png">
</div>

<!-- TEXTOS -->
<div class="info">
  <p class="direitos">
    Todos os direitos reservados à Paramount Skydance
  </p>

  <p class="descricao">
    Nós somos a NickWeb, um revival da Nickelodeon Brasil, por enquanto transmitimos na Twitch
  </p>
</div>

<!-- CHAT -->
<div id="chat" class="chat-overlay">
  <iframe src="https://nick-web.chatango.com/"></iframe>
</div>

<button class="chat-btn" onclick="toggleChat()">Chat</button>

<script>
function toggleChat() {
  const chat = document.getElementById("chat");
  chat.style.display =
    (chat.style.display === "none" || chat.style.display === "")
      ? "block"
      : "none";
}
</script>

</body>
</html>
