<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Nickelodeon Web</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<!-- Video.js -->
<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Inter, system-ui, sans-serif;
}

.topbar {
  padding: 14px 16px;
  font-size: 22px;
  font-weight: 600;
}

.player-wrapper {
  display: flex;
  justify-content: center;
  margin: 14px 0 6px;
}

/* 🔥 FIX REAL: evita Video.js quebrar layout */
.player {
  width: 95%;
  max-width: 900px;
  aspect-ratio: 16 / 9;
  border-radius: 12px;
  overflow: hidden;
  position: relative;
  background: #000;
  box-shadow: 0 0 25px rgba(128,0,255,0.35);
}

/* Video.js responsivo correto */
.video-js {
  width: 100% !important;
  height: 100% !important;
}

/* força vídeo preencher sem distorcer */
.vjs-tech {
  object-fit: cover;
}

/* CONTADOR */
.viewers-overlay {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(6px);
  padding: 6px 10px;
  border-radius: 20px;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
  z-index: 10;
}

/* resto intacto */
.logo-circle {
  display: flex;
  justify-content: center;
  margin: 18px 0 10px;
}

.logo-circle img {
  width: 110px;
  border-radius: 50%;
  border: 3px solid #fff;
  padding: 10px;
  object-fit: contain;
}

.content {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 16px 40px;
}

.chat-btn {
  position: fixed;
  right: 18px;
  bottom: 18px;
  background: #5f98e3;
  color: #fff;
  border: none;
  padding: 12px 18px;
  border-radius: 50px;
  cursor: pointer;
  z-index: 999;
}

.chat-overlay {
  position: fixed;
  right: 18px;
  bottom: 70px;
  width: 320px;
  height: 420px;
  background: #000;
  border: 1px solid #333;
  border-radius: 10px;
  display: none;
  z-index: 999;
}

.chat-overlay iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* MOBILE FIX */
@media (max-width: 480px) {
  .player {
    width: 100%;
    border-radius: 0;
  }

  .chat-overlay {
    width: 90%;
    right: 5%;
  }
}
</style>
</head>

<body>

<div class="topbar">Nickelodeon Web - AO VIVO!</div>

<div class="player-wrapper">
  <div class="player">

    <!-- Video.js -->
    <video
      id="video"
      class="video-js vjs-default-skin vjs-big-play-centered"
      controls
      autoplay
      muted
      playsinline
    ></video>

    <!-- CONTADOR -->
    <div class="viewers-overlay">
      👁 <span id="viewers">0</span>
    </div>

  </div>
</div>

<div class="logo-circle">
  <img src="https://i.ibb.co/TxV7nwLw/20260420-172534.png">
</div>

<div class="content">
  <h1>Nickelodeon Web</h1>
  <p>Todos os direitos reservados à Paramount Skydance</p>
  <p>Nós somos a Nickelodeon Web, um revival da Nickelodeon Brasil, assista seus desenhos favoritos aqui!</p>
</div>

<div id="chat" class="chat-overlay">
  <iframe src="https://nick-web.chatango.com/"></iframe>
</div>

<button class="chat-btn" onclick="toggleChat()">Chat</button>

<!-- Video.js -->
<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
function toggleChat() {
  const chat = document.getElementById("chat");
  chat.style.display = chat.style.display === "block" ? "none" : "block";
}

/* PLAYER VIDEO.JS FIXADO */
const player = videojs('video', {
  autoplay: true,
  muted: true,
  controls: true,
  fluid: true,
  liveui: true
});

player.src({
  src: "https://vs20.live.opencaster.com/nickelodeonbrasil_68f1743d/index.m3u8",
  type: "application/x-mpegURL"
});

/* CONTADOR ESTÁVEL */
let ultimoValorValido = 0;

function atualizarViewers() {
  fetch("https://api.allorigins.win/raw?url=" +
    encodeURIComponent("https://vs20.live.opencaster.com/show_current.php?streamname=nickelodeonbrasil_68f1743d"))
    .then(res => res.text())
    .then(texto => {

      let match = texto.match(/conexiones":(\d+)/);

      if (match && match[1]) {
        let valor = parseInt(match[1]);
        if (!isNaN(valor)) ultimoValorValido = valor;
      }

      document.getElementById("viewers").innerText = ultimoValorValido;
    })
    .catch(() => {
      document.getElementById("viewers").innerText = ultimoValorValido;
    });
}

atualizarViewers();
setInterval(atualizarViewers, 30000);
</script>

</body>
</html>
