<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>NickWeb</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Fonte igual ao print -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

/* TOPO */
.topbar {
  padding: 14px 16px;
  font-size: 22px;
  font-weight: 600;
}

/* PLAYER */
.player-wrapper {
  display: flex;
  justify-content: center;
  margin: 14px 0 6px;
}

.player {
  width: 92%;
  max-width: 900px;
  aspect-ratio: 16 / 9;
}

.player iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* LOGO */
.logo-circle {
  display: flex;
  justify-content: center;
  margin: 18px 0 10px;
}

.logo-circle img {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  border: 3px solid #fff;
  padding: 10px;
  background: #000;
}

/* CONTEÚDO */
.content {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 16px 40px;
}

/* TÍTULO GRANDE */
.content h1 {
  font-size: 28px;
  font-weight: 700;
  margin: 18px 0 10px;
}

/* TEXTO NORMAL */
.content p {
  font-size: 18px;
  line-height: 1.5;
  margin: 0 0 22px;
  opacity: 0.95;
}

/* BOTÃO CHAT */
.chat-btn {
  position: fixed;
  right: 18px;
  bottom: 18px;
  background: #111;
  color: #fff;
  border: 1px solid #333;
  padding: 12px 16px;
  font-size: 15px;
  border-radius: 8px;
  cursor: pointer;
}

/* CHAT */
.chat-overlay {
  position: fixed;
  right: 18px;
  bottom: 70px;
  width: 320px;
  height: 420px;
  background: #000;
  border: 1px solid #333;
  border-radius: 10px;
  display: none;
}

.chat-overlay iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<!-- TOPO -->
<div class="topbar">Nick Online</div>

<!-- PLAYER -->
<div class="player-wrapper">
  <div class="player">
    <iframe
      src="https://player.twitch.tv/?channel=nickelodeonbrasil309873&parent=live-nickweb.github.io&autoplay=true&muted=false"
      allowfullscreen
      allow="autoplay; fullscreen">
    </iframe>
  </div>
</div>

<!-- LOGO -->
<div class="logo-circle">
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Nickelodeon_2023_logo_%28outline%29.svg/250px-Nickelodeon_2023_logo_%28outline%29.svg.png">
</div>

<!-- TEXTO -->
<div class="content">
  <h1>Nick Online</h1>

  <p>
    Todos os direitos reservados à Paramount Skydance
  </p>

  <p>
    Nós somos a NickWeb, um revival da Nickelodeon Brasil, por enquanto transmitimos na Twitch
  </p>
</div>

<!-- CHAT -->
<div id="chat" class="chat-overlay">
  <iframe src="https://nick-web.chatango.com/"></iframe>
</div>

<button class="chat-btn" onclick="toggleChat()">Chat</button>

<script>
function toggleChat() {
  const chat = document.getElementById("chat");
  chat.style.display =
    chat.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
