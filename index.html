<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Nickelodeon Web</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Inter, system-ui, sans-serif;
}

.topbar {
  padding: 14px 16px;
  font-size: 22px;
  font-weight: 600;
}

/* PLAYER */
.player-container {
  position: relative;
  width: 95%;
  max-width: 900px;
  aspect-ratio: 16/9;
  margin: 20px auto;
  background: black;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 0 20px rgba(128,0,255,0.3);
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* CONTROLES */
.controls {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
}

.controls button {
  background: none;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

/* BARRA */
.progress {
  flex: 1;
  height: 4px;
  background: rgba(255,255,255,0.3);
  border-radius: 2px;
  overflow: hidden;
}

.progress-bar {
  width: 100%;
  height: 100%;
  background: white;
}

/* LIVE */
.live {
  display: flex;
  align-items: center;
  font-size: 14px;
  gap: 5px;
}

.dot {
  width: 10px;
  height: 10px;
  background: red;
  border-radius: 50%;
}

/* LOGO */
.logo-circle {
  display: flex;
  justify-content: center;
  margin: 18px 0 10px;
}

.logo-circle img {
  width: 110px;
  aspect-ratio: 1/1;
  border-radius: 50%;
  border: 3px solid #fff;
  padding: 10px;
}

/* TEXTO */
.content {
  max-width: 900px;
  margin: auto;
  padding: 0 16px 40px;
}

.content h1 {
  font-size: 28px;
}

.content p {
  font-size: 18px;
  opacity: 0.9;
}

/* CHAT */
.chat-btn {
  position: fixed;
  right: 18px;
  bottom: 18px;
  background: #5f98e3;
  color: #fff;
  border: none;
  padding: 12px 18px;
  border-radius: 50px;
  cursor: pointer;
}

.chat-overlay {
  position: fixed;
  right: 18px;
  bottom: 70px;
  width: 320px;
  height: 420px;
  background: #000;
  border-radius: 10px;
  display: none;
  overflow: hidden;
}

.chat-overlay iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<div class="topbar">Nickelodeon Web - AO VIVO!</div>

<!-- PLAYER -->
<div class="player-container">
  <video id="video" playsinline></video>

  <div class="controls">
    <button id="playPause">⏸</button>
    <button id="mute">🔊</button>

    <div class="progress">
      <div class="progress-bar"></div>
    </div>

    <div class="live">
      <span class="dot"></span> LIVE
    </div>

    <button id="fullscreen">⛶</button>
  </div>
</div>

<!-- LOGO -->
<div class="logo-circle">
  <img src="https://i.ibb.co/TxV7nwLw/20260420-172534.png">
</div>

<!-- TEXTO -->
<div class="content">
  <h1>Nickelodeon Web</h1>
  <p>Todos os direitos reservados à Paramount</p>
  <p>Canal revival da Nickelodeon Brasil, assista suas séries e desenhos favoritos aqui!</p>
</div>

<!-- CHAT -->
<div id="chat" class="chat-overlay">
  <iframe src="https://nick-web.chatango.com/"></iframe>
</div>

<button class="chat-btn" onclick="toggleChat()">Chat</button>

<!-- HLS -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
function toggleChat() {
  const chat = document.getElementById("chat");
  chat.style.display =
    chat.style.display === "block" ? "none" : "block";
}

const video = document.getElementById('video');
const videoSrc = 'https://vs20.live.opencaster.com/nickelodeonbrasil_68f1743d/index.m3u8';

/* HLS */
if (Hls.isSupported()) {
  const hls = new Hls();
  hls.loadSource(videoSrc);
  hls.attachMedia(video);

  hls.on(Hls.Events.ERROR, function (event, data) {
    if (data.fatal) {
      hls.startLoad();
    }
  });
} else {
  video.src = videoSrc;
}

/* AUTOPLAY */
video.muted = true;
video.play().catch(() => {});

/* CONTROLES */
const playPause = document.getElementById('playPause');
const mute = document.getElementById('mute');
const fullscreen = document.getElementById('fullscreen');

playPause.onclick = () => {
  if (video.paused) {
    video.play();
    playPause.textContent = "⏸";
  } else {
    video.pause();
    playPause.textContent = "▶";
  }
};

mute.onclick = () => {
  video.muted = !video.muted;
  mute.textContent = video.muted ? "🔇" : "🔊";
};

fullscreen.onclick = () => {
  if (video.requestFullscreen) {
    video.requestFullscreen();
  }
};
</script>

</body>
</html>
