<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Nickelodeon Web</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Inter, sans-serif;
}

.topbar {
  padding: 14px 16px;
  font-size: 22px;
  font-weight: 600;
}

/* PLAYER */
.player-wrapper {
  display: flex;
  justify-content: center;
  margin: 14px 0;
}

.player {
  width: 95%;
  max-width: 900px;
  aspect-ratio: 16/9;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 0 20px rgba(128,0,255,0.3);
  position: relative;
  background: #000;
}

.player video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* OVERLAY */
.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  transition: opacity 0.3s;
}

.overlay.hide {
  opacity: 0;
}

.top-info {
  display: flex;
  justify-content: space-between;
  padding: 10px;
}

.live-badge {
  background: red;
  padding: 6px 10px;
  border-radius: 6px;
  font-weight: bold;
  font-size: 13px;
}

.viewers {
  font-size: 13px;
  color: #ccc;
}

.controls {
  display: flex;
  gap: 8px;
  padding: 10px;
  background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

.controls button {
  background: rgba(255,255,255,0.1);
  border: none;
  color: #fff;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
}

/* LOGO */
.logo-circle {
  display: flex;
  justify-content: center;
  margin: 18px 0;
}

.logo-circle img {
  width: 110px;
  border-radius: 50%;
  border: 3px solid #fff;
  padding: 10px;
}

/* TEXTO */
.content {
  max-width: 900px;
  margin: auto;
  padding: 0 16px 40px;
}

.content h1 {
  font-size: 28px;
}

.content p {
  font-size: 18px;
}

/* CHAT */
.chat-btn {
  position: fixed;
  right: 18px;
  bottom: 18px;
  background: #8000ff;
  border: none;
  padding: 12px 18px;
  border-radius: 50px;
  color: #fff;
  cursor: pointer;
}

.chat-overlay {
  position: fixed;
  right: 18px;
  bottom: 70px;
  width: 320px;
  height: 420px;
  background: #000;
  border: 1px solid #333;
  border-radius: 10px;
  display: none;
}

.chat-overlay iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<div class="topbar">Nickelodeon Web - AO VIVO!</div>

<!-- PLAYER -->
<div class="player-wrapper">
  <div class="player" id="player">

    <video id="video" playsinline></video>

    <div class="overlay" id="overlay">
      <div class="top-info">
        <div class="live-badge">● AO VIVO</div>
        <div class="viewers" id="viewers">Carregando...</div>
      </div>

      <div class="controls">
        <button onclick="togglePlay()">▶</button>
        <button onclick="toggleMute()">🔊</button>
        <button onclick="goFullscreen()">⛶</button>
      </div>
    </div>

  </div>
</div>

<!-- LOGO -->
<div class="logo-circle">
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Nickelodeon_2023_logo_%28outline%29.svg/250px-Nickelodeon_2023_logo_%28outline%29.svg.png">
</div>

<!-- TEXTO -->
<div class="content">
  <h1>Nickelodeon Web</h1>
  <p>Todos os direitos reservados à Paramount Skydance</p>
  <p>Revival da Nickelodeon Brasil via OpenCaster</p>
</div>

<!-- CHAT -->
<div id="chat" class="chat-overlay">
  <iframe src="https://nick-web.chatango.com/"></iframe>
</div>

<button class="chat-btn" onclick="toggleChat()">Chat</button>

<!-- HLS -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
const video = document.getElementById('video');
const videoSrc = 'https://vs20.live.opencaster.com/nickelodeonbrasil_68f1743d/index.m3u8';

if (Hls.isSupported()) {
  const hls = new Hls();
  hls.loadSource(videoSrc);
  hls.attachMedia(video);
} else if (video.canPlayType('application/vnd.apple.mpegurl')) {
  video.src = videoSrc;
}

/* CONTROLES */
function togglePlay() {
  video.paused ? video.play() : video.pause();
}

function toggleMute() {
  video.muted = !video.muted;
}

function goFullscreen() {
  video.requestFullscreen();
}

/* AUTO HIDE */
let timeout;

function showOverlay() {
  const overlay = document.getElementById("overlay");
  overlay.classList.remove("hide");

  clearTimeout(timeout);
  timeout = setTimeout(() => {
    overlay.classList.add("hide");
  }, 3000);
}

document.getElementById("player").addEventListener("mousemove", showOverlay);
document.getElementById("player").addEventListener("touchstart", showOverlay);

setTimeout(() => {
  document.getElementById("overlay").classList.add("hide");
}, 3000);

/* VIEWERS */
async function atualizarViewers() {
  try {
    const res = await fetch("https://new.opencaster.com/api/user/NickelodeonBrasil");
    const data = await res.json();

    const viewers = data.viewers || data.view_count || data.audience || 0;

    document.getElementById("viewers").innerText =
      viewers + " assistindo";

  } catch {
    let v = Math.floor(Math.random() * 30) + 10;
    document.getElementById("viewers").innerText =
      v + " assistindo";
  }
}

setInterval(atualizarViewers, 10000);
atualizarViewers();

/* CHAT */
function toggleChat() {
  const chat = document.getElementById("chat");
  chat.style.display =
    chat.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
