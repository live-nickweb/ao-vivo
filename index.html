<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Nickelodeon Web</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<!-- Video.js CSS -->
<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Inter, sans-serif;
}

.topbar {
  padding: 14px 16px;
  font-size: 22px;
  font-weight: 600;
}

.player-wrapper {
  display: flex;
  justify-content: center;
  margin: 14px 0;
}

.video-js {
  width: 95%;
  max-width: 900px;
  aspect-ratio: 16/9;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(128,0,255,0.4);
}

/* deixar mais bonito */
.vjs-control-bar {
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
}

.vjs-big-play-button {
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  border: none;
  font-size: 2em;
}

.vjs-big-play-button:hover {
  background: rgba(128,0,255,0.8);
}

.logo-circle {
  display: flex;
  justify-content: center;
  margin: 18px 0 10px;
}

.logo-circle img {
  width: 110px;
  border-radius: 50%;
  border: 3px solid #fff;
  padding: 10px;
}

.content {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 16px 40px;
}
</style>
</head>

<body>

<div class="topbar">Nickelodeon Web - AO VIVO!</div>

<div class="player-wrapper">
  <video
    id="my-video"
    class="video-js vjs-default-skin"
    controls
    autoplay
    muted
    playsinline
  ></video>
</div>

<div class="logo-circle">
  <img src="https://i.ibb.co/TxV7nwLw/20260420-172534.png">
</div>

<div class="content">
  <h1>Nickelodeon Web</h1>
  <p>Revival da Nickelodeon Brasil.</p>
</div>

<!-- Video.js -->
<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
const player = videojs('my-video', {
  autoplay: true,
  muted: true,
  controls: true,
  fluid: true
});

player.src({
  src: 'https://vs20.live.opencaster.com/nickelodeonbrasil_68f1743d/index.m3u8',
  type: 'application/x-mpegURL'
});
</script>

</body>
</html>
