<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>NickWeb</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #000;
  color: #fff;
}

.topbar {
  background: #0e0e0e;
  padding: 14px;
  font-size: 22px;
  font-weight: bold;
}

.player-wrapper {
  display: flex;
  justify-content: center;
  margin-top: 10px;
}

.player {
  width: 90%;
  max-width: 900px;
  aspect-ratio: 16 / 9;
  background: black;
}

.player iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.info {
  max-width: 900px;
  margin: 15px auto;
  padding: 0 15px;
}

.info h1 {
  margin: 0;
  font-size: 26px;
}

.info p {
  margin-top: 6px;
  font-size: 14px;
  opacity: 0.85;
}

/* BOTÃO CHAT */
.chat-btn {
  display: block;
  margin: 15px auto;
  background: #6a0dad;
  color: #fff;
  border: none;
  padding: 12px 20px;
  font-size: 16px;
  cursor: pointer;
  border-radius: 6px;
}

.chat-btn:hover {
  background: #7d1fd1;
}

/* CHAT */
.chat-box {
  max-width: 900px;
  margin: 0 auto 30px;
  height: 420px;
  padding: 0 15px;
  display: none; /* COMEÇA FECHADO */
}
</style>
</head>

<body>

<div class="topbar">NickWeb</div>

<div class="player-wrapper">
  <div class="player">
    <iframe
      src="https://player.twitch.tv/?channel=nickelodeonbrasil309873&parent=live-nickweb.github.io&autoplay=true&muted=false"
      allowfullscreen
      allow="autoplay; fullscreen">
    </iframe>
  </div>
</div>

<div class="info">
  <h1>NickWeb</h1>
  <p>Todos os direitos reservados à Paramount Skydance</p>
</div>

<button class="chat-btn" onclick="toggleChat()">Abrir chat</button>

<div id="chat" class="chat-box">
  <script id="cid0020000430246339067"
    data-cfasync="false"
    async
    src="//st.chatango.com/js/gz/emb.js"
    style="width:100%;height:100%;">
    {
      "handle":"nick-web",
      "arch":"js",
      "styles":{
        "b":100,
        "c":"000000",
        "d":"000000",
        "l":"FFFFFF",
        "m":"FFFFFF",
        "p":"10",
        "r":100,
        "surl":0,
        "fwtickm":1
      }
    }
  </script>
</div>

<script>
function toggleChat() {
  const chat = document.getElementById("chat");
  const btn = document.querySelector(".chat-btn");

  if (chat.style.display === "none") {
    chat.style.display = "block";
    btn.textContent = "Fechar chat";
  } else {
    chat.style.display = "none";
    btn.textContent = "Abrir chat";
  }
}
</script>

</body>
</html>
